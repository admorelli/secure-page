name: e2e

# Runs the Playwright E2E suite against the production build.
# Dormant until the project is ready: it only fires on pushes/PRs to `master`.
# While work lives on `feat/*` branches, this workflow won't trigger — flip the
# branch filter (or add `feat/pwa-poc`) when you want CI to gate feature branches.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
